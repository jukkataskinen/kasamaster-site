<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kasamaster — Tulossa pian</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Barlow Condensed',sans-serif;
  }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:6px; line-height:1; }
  .logo span:first-child { color:#FFC107; }
  .logo span:last-child  { color:#C8C8C8; display:block; }
  .tagline { color:#888; font-size:16px; letter-spacing:4px; text-transform:uppercase; margin-top:16px; }
  .dot { width:8px; height:8px; background:#FFC107; border-radius:50%; margin:40px auto 0; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  .contact { margin-top:32px; color:#555; font-size:14px; letter-spacing:1px; }
  .contact a { color:#FFC107; text-decoration:none; }
</style>
</head>
<body>
  <div>
    <div class="logo">
      <span>KASA</span>
      <span>MASTER</span>
    </div>
    <div class="tagline">Avataan pian</div>
    <div class="dot"></div>
    <div class="contact">Kysymyksiä? <a href="mailto:info@kasamaster.fi">info@kasamaster.fi</a></div>
  </div>
</body>
</html>
